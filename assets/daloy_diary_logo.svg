<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D4727E"/>
      <stop offset="100%" stop-color="#E8A87C"/>
    </linearGradient>
    <linearGradient id="dropGrad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#D4727E"/>
      <stop offset="100%" stop-color="#C46A76"/>
    </linearGradient>
  </defs>

  <style>
    /* Cycle ring: slow progress sweep */
    #cycleRing {
      stroke-dasharray: 327;
      stroke-dashoffset: 82;
      animation: sweep 5s ease-in-out infinite;
    }
    @keyframes sweep {
      0%   { stroke-dashoffset: 82; }
      50%  { stroke-dashoffset: -82; }
      100% { stroke-dashoffset: 82; }
    }

    /* Droplet: gentle breathing scale */
    #droplet {
      transform-origin: 64px 68px;
      animation: breathe 3.5s ease-in-out infinite;
    }
    @keyframes breathe {
      0%, 100% { transform: scale(1); }
      50%      { transform: scale(1.04); }
    }

    /* Sparkles: staggered soft fade */
    #sparkles circle {
      animation: twinkle 4s ease-in-out infinite;
    }
    #sparkles circle:nth-child(1) { animation-delay: 0s; }
    #sparkles circle:nth-child(2) { animation-delay: 1s; }
    #sparkles circle:nth-child(3) { animation-delay: 2s; }
    #sparkles circle:nth-child(4) { animation-delay: 3s; }
    @keyframes twinkle {
      0%, 100% { opacity: 0.15; }
      50%      { opacity: 0.6; }
    }
  </style>

  <!-- Outer cycle ring -->
  <circle id="cycleRing"
    cx="64" cy="64" r="52"
    fill="none"
    stroke="url(#ringGrad)"
    stroke-width="3.5"
    stroke-linecap="round"/>

  <!-- Inner subtle ring -->
  <circle id="innerRing"
    cx="64" cy="64" r="42"
    fill="none"
    stroke="#F2D4D7"
    stroke-width="1.5"
    opacity="0.6"/>

  <!-- Droplet-heart shape -->
  <g id="droplet">
    <path
      d="M64 30
         C64 30 36 58 36 76
         a28 28 0 0 0 28 28
         a28 28 0 0 0 28-28
         C92 58 64 30 64 30z"
      fill="url(#dropGrad)"
      opacity="0.9"/>
    <!-- Inner highlight -->
    <ellipse cx="56" cy="72" rx="8" ry="11"
      fill="#F2D4D7" opacity="0.35"/>
  </g>

  <!-- Sparkle dots -->
  <g id="sparkles">
    <circle cx="64" cy="8"   r="2" fill="#D4727E"/>
    <circle cx="110" cy="36" r="1.5" fill="#9B8EC4"/>
    <circle cx="110" cy="92" r="1.5" fill="#E8A87C"/>
    <circle cx="18"  cy="64" r="1.5" fill="#8EAA91"/>
  </g>
</svg>
